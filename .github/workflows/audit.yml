name: Smart Contract Security Audit

on:
  push:
    paths:
      - "contracts/**"
  pull_request:
    paths:
      - "contracts/**"
  workflow_dispatch:

jobs:
  slither:
    name: Slither Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install solc 0.8.28
        run: |
          pip install solc-select
          solc-select install 0.8.28
          solc-select use 0.8.28

      - name: Install Slither
        run: pip install slither-analyzer

      - name: Run Slither
        run: slither contracts/src/PolicyManager.sol --fail-medium

  mythril:
    name: Mythril Symbolic Execution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install solc 0.8.28
        run: |
          pip install solc-select
          solc-select install 0.8.28
          solc-select use 0.8.28

      - name: Install Mythril
        run: pip install mythril

      - name: Run Mythril
        run: myth analyze contracts/src/PolicyManager.sol --solv 0.8.28 --execution-timeout 90
