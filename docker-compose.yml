version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: codex-payrails-db
    environment:
      POSTGRES_DB: payrails
      POSTGRES_USER: payrails
      POSTGRES_PASSWORD: payrails
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payrails"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: codex-payrails-agent
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://payrails:payrails@db:5432/payrails
      PORT: 5000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
